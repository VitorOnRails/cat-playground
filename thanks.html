<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="author" content="Vitor">
        <title>Recado entregue!</title>
        <link rel="icon" type="image/x-icon" href="images/cat-favicon.ico">
        <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">

        <style>

            body {
                background-color: #FFF4E6;
                min-height: 100vh;
                position: relative;
                font-family: Ubuntu, Helvetica, sans-serif;
                background-image: url(images/overlay.png), url(images/cat-bg.png);
            }

            .container {
                max-width: 500px;
                width: 80%;
                margin: 0 auto;
                padding: 2em;
                text-align: center;
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }

            h1 {
                font-size: 28px;
                font-weight: 700;
                color: #7a4f3a;
                margin-bottom: 1em;
            }

            p {
                margin-bottom: 0.5em;
                font-weight: 400;
                color: #f7f7f7;
            }

            .default-button {
                width: auto;
                text-decoration: none;
                color: #efefef;
                background-color: #E67E22;
                border: 2px solid #7a4f3a;
                border-radius: 5px;
                padding: 0.25em 0.75em;
                font-size: 0.9em;
                display: inline-block;
                margin-bottom: 0.5em;
                cursor: pointer;
                transition: background-color 0.2s linear;
            }

            .default-button:hover {
                background-color: #7a4f3a;
                border-color: #E67E22;
            }

            .gif-container {
                border-radius: 20px;
            }

            img {
                width: 100%;
                height: 400px;
                display: block;
                object-fit: cover;

            }

            p {
                font-size: 18px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Valeu! O gato finalmente acordou e me entregou seu recado.</h1>
                <div class="gif-container">
                    <img src="images/cat-mouse.gif" alt="Gato navegando pela internet">
                </div>
            <p>A qualquer momento o meu supervisor felino vai me acordar para eu ler sua groselha.</p>
            <a class="default-button" href="index.html" class="button">Voltar e procrastinar mais</a>
        </div>
    </body>
</html>
